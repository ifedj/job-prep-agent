<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Prep Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .spinner { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ─── API helpers ──────────────────────────────────────────────────────────
    const api = {
      async get(path) {
        const r = await fetch(`/api${path}`, { credentials: 'include' });
        if (!r.ok) throw new Error((await r.json().catch(() => ({}))).detail || r.statusText);
        return r.json();
      },
      async post(path, body, extraHeaders) {
        const r = await fetch(`/api${path}`, {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json', ...extraHeaders },
          body: body ? JSON.stringify(body) : undefined,
        });
        if (!r.ok) throw new Error((await r.json().catch(() => ({}))).detail || r.statusText);
        return r.json();
      },
      async patch(path, body) {
        const r = await fetch(`/api${path}`, {
          method: 'PATCH', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!r.ok) throw new Error((await r.json().catch(() => ({}))).detail || r.statusText);
        return r.json();
      },
      async upload(path, formData) {
        const r = await fetch(`/api${path}`, {
          method: 'POST', credentials: 'include', body: formData,
        });
        if (!r.ok) throw new Error((await r.json().catch(() => ({}))).detail || r.statusText);
        return r.json();
      },
      async authGet(path) {
        const r = await fetch(`/auth${path}`, { credentials: 'include' });
        if (!r.ok) throw new Error((await r.json().catch(() => ({}))).detail || r.statusText);
        return r.json();
      },
    };

    // ─── Tiny components ─────────────────────────────────────────────────────
    function Spinner() {
      return <svg className="spinner w-5 h-5 text-blue-600" fill="none" viewBox="0 0 24 24">
        <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
        <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
      </svg>;
    }

    function Badge({ label }) {
      const colors = {
        interview: 'bg-green-100 text-green-800',
        recruiter_screen: 'bg-blue-100 text-blue-800',
        networking: 'bg-purple-100 text-purple-800',
        company_intro: 'bg-yellow-100 text-yellow-800',
        not_job_related: 'bg-gray-100 text-gray-600',
        ambiguous: 'bg-orange-100 text-orange-800',
      };
      const cls = colors[label] || 'bg-gray-100 text-gray-700';
      return <span className={`text-xs font-medium px-2.5 py-0.5 rounded-full ${cls}`}>
        {(label || '').replace(/_/g, ' ')}
      </span>;
    }

    function Alert({ type = 'error', msg, onClose }) {
      const cls = type === 'error'
        ? 'bg-red-50 border-red-200 text-red-700'
        : 'bg-green-50 border-green-200 text-green-700';
      return <div className={`border rounded-lg p-3 flex items-start gap-2 ${cls}`}>
        <span className="flex-1 text-sm">{msg}</span>
        {onClose && <button onClick={onClose} className="text-xs opacity-60 hover:opacity-100">✕</button>}
      </div>;
    }

    // ─── Onboarding flow ─────────────────────────────────────────────────────
    function Onboarding({ onComplete }) {
      const [step, setStep] = useState(1);
      const [form, setForm] = useState({ name: '', email: '', target_roles: '', background_summary: '', key_projects: '' });
      const [resumeFile, setResumeFile] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      async function submitProfile() {
        setLoading(true); setError('');
        try {
          const roles = form.target_roles.split(',').map(r => r.trim()).filter(Boolean);
          const projects = form.key_projects.split(',').map(p => p.trim()).filter(Boolean);
          await api.post('/profile', {
            name: form.name, email: form.email,
            target_roles: roles,
            background_summary: form.background_summary,
            key_projects: projects,
          });
          setStep(2);
        } catch (e) { setError(e.message); }
        finally { setLoading(false); }
      }

      async function submitResume() {
        setLoading(true); setError('');
        try {
          if (resumeFile) {
            const fd = new FormData();
            fd.append('file', resumeFile);
            await api.upload('/profile/resume', fd);
          }
          setStep(3);
        } catch (e) { setError(e.message); }
        finally { setLoading(false); }
      }

      async function connectGoogle() {
        const data = await api.authGet('/google/start').catch(e => { setError(e.message); return null; });
        if (data) window.location.href = data.authorization_url;
      }

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="bg-white rounded-2xl shadow-lg w-full max-w-lg p-8 fade-in">
            {/* Progress */}
            <div className="flex gap-2 mb-8">
              {[1,2,3].map(n => (
                <div key={n} className={`h-1.5 flex-1 rounded-full ${n <= step ? 'bg-blue-600' : 'bg-gray-200'}`}/>
              ))}
            </div>

            {step === 1 && <>
              <h1 className="text-2xl font-bold mb-1">Welcome to Job Prep Agent</h1>
              <p className="text-gray-500 mb-4">Let's set up your profile so we can tailor your prep packs.</p>
              <a href="/demo"
                className="block w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-lg py-3 font-semibold text-center hover:from-blue-700 hover:to-indigo-700 shadow-sm">
                ✨ Try Demo — see it in action instantly
              </a>
              <p className="text-center text-xs text-gray-400 mt-1 mb-5">
                Shareable link: <span className="font-mono">{window.location.host}/demo</span>
              </p>
              <div className="flex items-center gap-3 mb-6">
                <div className="flex-1 h-px bg-gray-200"/>
                <span className="text-xs text-gray-400 font-medium">or set up your own profile</span>
                <div className="flex-1 h-px bg-gray-200"/>
              </div>
              <div className="space-y-4">
                <div>
                  <label className="block text-sm font-medium mb-1">Full name</label>
                  <input className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                    value={form.name} onChange={e => set('name', e.target.value)} placeholder="Jane Smith"/>
                </div>
                <div>
                  <label className="block text-sm font-medium mb-1">Email address</label>
                  <input type="email" className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                    value={form.email} onChange={e => set('email', e.target.value)} placeholder="jane@example.com"/>
                </div>
                <div>
                  <label className="block text-sm font-medium mb-1">Target roles <span className="text-gray-400">(comma-separated)</span></label>
                  <input className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                    value={form.target_roles} onChange={e => set('target_roles', e.target.value)}
                    placeholder="Software Engineer, Product Manager"/>
                </div>
                <div>
                  <label className="block text-sm font-medium mb-1">Background summary</label>
                  <textarea rows={3} className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                    value={form.background_summary} onChange={e => set('background_summary', e.target.value)}
                    placeholder="Brief summary of your experience and what you're looking for..."/>
                </div>
                <div>
                  <label className="block text-sm font-medium mb-1">Key projects <span className="text-gray-400">(comma-separated)</span></label>
                  <input className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                    value={form.key_projects} onChange={e => set('key_projects', e.target.value)}
                    placeholder="AI chatbot, payment platform, open-source library"/>
                </div>
              </div>
              {error && <div className="mt-3"><Alert msg={error} onClose={() => setError('')}/></div>}
              <button onClick={submitProfile} disabled={loading || !form.email}
                className="mt-6 w-full bg-blue-600 text-white rounded-lg py-2.5 font-medium hover:bg-blue-700 disabled:opacity-50 flex items-center justify-center gap-2">
                {loading ? <Spinner/> : null} Continue →
              </button>
            </>}

            {step === 2 && <>
              <h1 className="text-2xl font-bold mb-1">Upload your resume</h1>
              <p className="text-gray-500 mb-6">We'll extract your experience to personalize prep packs. Optional but recommended.</p>
              <label className="block border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer hover:border-blue-400 transition-colors">
                <input type="file" accept=".pdf" className="hidden" onChange={e => setResumeFile(e.target.files[0])}/>
                {resumeFile
                  ? <><div className="text-3xl mb-2">📄</div><p className="font-medium text-sm">{resumeFile.name}</p><p className="text-xs text-gray-400 mt-1">Click to change</p></>
                  : <><div className="text-3xl mb-2">☁️</div><p className="text-sm font-medium">Drop PDF here or click to browse</p><p className="text-xs text-gray-400 mt-1">Max 10 MB</p></>
                }
              </label>
              {error && <div className="mt-3"><Alert msg={error} onClose={() => setError('')}/></div>}
              <div className="flex gap-3 mt-6">
                <button onClick={() => setStep(3)} className="flex-1 border border-gray-300 text-gray-700 rounded-lg py-2.5 font-medium hover:bg-gray-50">
                  Skip
                </button>
                <button onClick={submitResume} disabled={loading}
                  className="flex-1 bg-blue-600 text-white rounded-lg py-2.5 font-medium hover:bg-blue-700 disabled:opacity-50 flex items-center justify-center gap-2">
                  {loading ? <Spinner/> : null} {resumeFile ? 'Upload & Continue' : 'Continue'} →
                </button>
              </div>
            </>}

            {step === 3 && <>
              <h1 className="text-2xl font-bold mb-1">Connect Google</h1>
              <p className="text-gray-500 mb-6">Connect your Google account to sync Calendar and Gmail for meeting context.</p>
              <div className="bg-blue-50 rounded-xl p-4 mb-6 text-sm text-blue-800 space-y-1">
                <p className="font-semibold">Permissions requested:</p>
                <p>📅 Read upcoming calendar events</p>
                <p>📧 Read related email threads</p>
                <p>✉️ Send prep pack emails to yourself</p>
              </div>
              <button onClick={connectGoogle}
                className="w-full bg-white border-2 border-gray-200 rounded-lg py-3 font-medium hover:bg-gray-50 flex items-center justify-center gap-3 shadow-sm">
                <svg viewBox="0 0 24 24" className="w-5 h-5">
                  <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                  <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                  <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                  <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Connect with Google
              </button>
              <button onClick={() => onComplete()} className="mt-3 w-full text-gray-400 text-sm hover:text-gray-600 py-2">
                Skip for now (limited functionality)
              </button>
            </>}
          </div>
        </div>
      );
    }

    // ─── Dashboard ───────────────────────────────────────────────────────────
    function Dashboard({ user, authStatus, onPage }) {
      const [events, setEvents] = useState([]);
      const [syncStatus, setSyncStatus] = useState(null);
      const [loading, setLoading] = useState(true);
      const [syncing, setSyncing] = useState(false);
      const [reviewCount, setReviewCount] = useState(0);
      const [error, setError] = useState('');

      const load = useCallback(async () => {
        setLoading(true);
        try {
          const [evts, status, queue] = await Promise.all([
            api.get('/events').catch(() => []),
            api.get('/sync/status').catch(() => null),
            api.get('/review').catch(() => []),
          ]);
          setEvents(evts);
          setSyncStatus(status);
          setReviewCount(queue.length);
        } catch (e) { setError(e.message); }
        finally { setLoading(false); }
      }, []);

      useEffect(() => { load(); }, [load]);

      async function triggerSync() {
        setSyncing(true); setError('');
        try {
          await api.post('/sync/trigger');
          setTimeout(load, 3000); // Reload after a few seconds
        } catch (e) { setError(e.message); }
        finally { setSyncing(false); }
      }

      const fmt = (dt) => {
        const d = new Date(dt + 'Z');
        return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
      };

      return (
        <div className="max-w-4xl mx-auto px-4 py-8">
          {/* Header */}
          <div className="flex items-center justify-between mb-8">
            <div>
              <h1 className="text-2xl font-bold">Job Prep Agent</h1>
              <p className="text-gray-500 text-sm mt-1">Welcome back, {user?.name || user?.email}</p>
            </div>
            <div className="flex gap-3">
              {reviewCount > 0 && (
                <button onClick={() => onPage('review')} className="bg-orange-500 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-orange-600 flex items-center gap-2">
                  Review Queue
                  <span className="bg-white text-orange-500 rounded-full w-5 h-5 text-xs flex items-center justify-center font-bold">{reviewCount}</span>
                </button>
              )}
              <button onClick={() => onPage('profile')} className="border border-gray-300 px-4 py-2 rounded-lg text-sm hover:bg-gray-50">
                Profile
              </button>
              <button onClick={triggerSync} disabled={syncing || !authStatus?.google_connected}
                className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50 flex items-center gap-2">
                {syncing ? <Spinner/> : '⟳'} Sync Now
              </button>
            </div>
          </div>

          {/* Sync status bar */}
          {syncStatus && (
            <div className="bg-white border border-gray-200 rounded-xl p-4 mb-6 flex items-center gap-6 text-sm">
              <div>
                <span className="text-gray-500">Last sync: </span>
                <span className="font-medium">{syncStatus.last_sync_at ? new Date(syncStatus.last_sync_at + 'Z').toLocaleString() : 'Never'}</span>
              </div>
              <div>
                <span className="text-gray-500">Upcoming events: </span>
                <span className="font-medium">{syncStatus.events_in_db}</span>
              </div>
              <div>
                <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium ${syncStatus.google_connected ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                  {syncStatus.google_connected ? '● Google Connected' : '● Not Connected'}
                </span>
              </div>
              {!syncStatus.google_connected && (
                <a href="/auth/google/start" className="ml-auto text-blue-600 hover:underline text-xs">Connect Google →</a>
              )}
            </div>
          )}

          {error && <div className="mb-4"><Alert msg={error} onClose={() => setError('')}/></div>}

          {/* Events list */}
          {loading ? (
            <div className="flex justify-center py-16"><Spinner/></div>
          ) : events.length === 0 ? (
            <div className="text-center py-16 text-gray-400">
              <div className="text-5xl mb-4">📅</div>
              <p className="text-lg font-medium text-gray-600">No job-related meetings found</p>
              <p className="mt-1 text-sm">Sync your calendar to detect upcoming meetings</p>
            </div>
          ) : (
            <div className="space-y-3">
              {events.map(event => (
                <EventCard key={event.id} event={event} onPage={onPage} onSelected={(e) => onPage('event', e)}/>
              ))}
            </div>
          )}
        </div>
      );
    }

    function EventCard({ event, onSelected }) {
      const fmt = (dt) => new Date(dt + 'Z').toLocaleDateString('en-US', {
        weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
      });

      const statusIcon = {
        done: '✅',
        pending: '⏳',
        generating: '🔄',
        failed: '❌',
      };

      const clf = event.classification;
      const daysUntil = Math.ceil((new Date(event.start_time + 'Z') - new Date()) / (1000 * 60 * 60 * 24));

      return (
        <div className="bg-white border border-gray-200 rounded-xl p-5 hover:shadow-md transition-shadow cursor-pointer fade-in"
          onClick={() => onSelected(event)}>
          <div className="flex items-start justify-between gap-4">
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 mb-1">
                {clf && <Badge label={clf.effective_label}/>}
                {daysUntil <= 1 && <span className="text-xs bg-red-100 text-red-700 px-2 py-0.5 rounded-full font-medium">Tomorrow</span>}
                {daysUntil === 0 && <span className="text-xs bg-red-500 text-white px-2 py-0.5 rounded-full font-medium">Today</span>}
              </div>
              <h3 className="font-semibold text-gray-900 truncate">{event.title}</h3>
              <p className="text-sm text-gray-500 mt-1">{fmt(event.start_time)}</p>
              {clf?.company_name && (
                <p className="text-sm text-gray-600 mt-1">🏢 {clf.company_name}{clf.role_title ? ` · ${clf.role_title}` : ''}</p>
              )}
            </div>
            <div className="flex items-center gap-3 flex-shrink-0">
              {event.prep_pack_status && (
                <span className="text-sm">{statusIcon[event.prep_pack_status] || '?'} {event.prep_pack_status}</span>
              )}
              {clf && (
                <span className="text-xs text-gray-400">{Math.round((clf.confidence || 0) * 100)}%</span>
              )}
              <span className="text-gray-400">›</span>
            </div>
          </div>
        </div>
      );
    }

    // ─── Event Detail / Prep Pack ─────────────────────────────────────────────
    function EventDetail({ eventId, onBack }) {
      const [event, setEvent] = useState(null);
      const [pack, setPack] = useState(null);
      const [loading, setLoading] = useState(true);
      const [genLoading, setGenLoading] = useState(false);
      const [emailLoading, setEmailLoading] = useState(false);
      const [emailLogs, setEmailLogs] = useState([]);
      const [msg, setMsg] = useState(null);
      const [pollingRef, setPollingRef] = useState(null);
      const [apiKey, setApiKey] = useState(() => localStorage.getItem('demo_anthropic_key') || '');
      const [testerEmail, setTesterEmail] = useState(() => localStorage.getItem('demo_email') || '');
      const [showOptions, setShowOptions] = useState(false);

      const load = useCallback(async () => {
        try {
          const e = await api.get(`/events/${eventId}`);
          setEvent(e);
          if (e.has_prep_pack) {
            const packs = await api.get('/prep-packs');
            const found = packs.find(p => p.event_id === eventId);
            if (found) {
              setPack(found);
              const logs = await api.get(`/prep-packs/${found.id}/email-log`).catch(() => []);
              setEmailLogs(logs);
            }
          }
        } catch(e) { console.error(e); }
        finally { setLoading(false); }
      }, [eventId]);

      useEffect(() => { load(); }, [load]);

      // Poll while generating
      useEffect(() => {
        if (pack?.generation_status === 'generating') {
          const t = setInterval(load, 3000);
          return () => clearInterval(t);
        }
      }, [pack?.generation_status, load]);

      async function generate() {
        setGenLoading(true); setMsg(null);
        try {
          const headers = apiKey ? { 'X-Anthropic-Key': apiKey } : {};
          const body = testerEmail ? { email: testerEmail } : null;
          if (pack?.id) {
            await api.post(`/prep-packs/${pack.id}/regenerate`, body, headers);
          } else {
            await api.post(`/prep-packs/generate/${eventId}`, body, headers);
          }
          const emailNote = testerEmail ? ` We'll email the pack to ${testerEmail}.` : '';
          setMsg({ type: 'success', text: `Generation started. This may take 15–30 seconds.${emailNote}` });
          setTimeout(load, 5000);
        } catch(e) { setMsg({ type: 'error', text: e.message }); }
        finally { setGenLoading(false); }
      }

      async function sendEmail() {
        setEmailLoading(true); setMsg(null);
        try {
          const r = await api.post(`/prep-packs/${pack.id}/send-email`);
          setMsg({ type: 'success', text: r.status === 'skipped_duplicate' ? 'Already sent (no new changes).' : 'Email sent!' });
          load();
        } catch(e) { setMsg({ type: 'error', text: e.message }); }
        finally { setEmailLoading(false); }
      }

      const clf = event?.classification;

      if (loading) return <div className="flex justify-center py-20"><Spinner/></div>;
      if (!event) return <div className="text-center py-20 text-gray-400">Event not found</div>;

      return (
        <div className="max-w-3xl mx-auto px-4 py-8">
          <button onClick={onBack} className="text-blue-600 text-sm hover:underline mb-6 flex items-center gap-1">← Back</button>

          {/* Event header */}
          <div className="bg-white border border-gray-200 rounded-xl p-6 mb-6">
            <div className="flex items-start gap-4">
              <div className="flex-1">
                <div className="flex gap-2 mb-2 flex-wrap">
                  {clf && <Badge label={clf.effective_label}/>}
                  {clf?.confidence && (
                    <span className="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">
                      {Math.round(clf.confidence * 100)}% confidence
                    </span>
                  )}
                </div>
                <h1 className="text-xl font-bold">{event.title}</h1>
                <p className="text-gray-500 mt-1">
                  {new Date(event.start_time + 'Z').toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: 'numeric', minute: '2-digit' })}
                </p>
                {clf?.company_name && <p className="text-sm text-gray-600 mt-1">🏢 {clf.company_name}{clf.role_title ? ` · ${clf.role_title}` : ''}</p>}
                {event.attendees?.length > 0 && (
                  <p className="text-sm text-gray-500 mt-1">👥 {event.attendees.map(a => a.name || a.email).join(', ')}</p>
                )}
                {clf?.reasoning && (
                  <p className="text-xs text-gray-400 mt-2 italic">"{clf.reasoning}"</p>
                )}
              </div>
              <div className="flex flex-col gap-2 min-w-[180px]">
                <button onClick={generate} disabled={genLoading}
                  className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50 flex items-center gap-2 whitespace-nowrap">
                  {genLoading ? <Spinner/> : '✨'} {pack ? 'Regenerate' : 'Generate Prep Pack'}
                </button>
                <button onClick={() => setShowOptions(v => !v)}
                  className="text-xs text-gray-400 hover:text-gray-600 text-center py-0.5">
                  ⚙️ {testerEmail ? `Email → ${testerEmail.split('@')[0]}@…` : 'Add email to receive pack'}
                </button>
                {showOptions && (
                  <div className="mt-1 space-y-2">
                    <div>
                      <label className="text-xs text-gray-500 font-medium">Your email (receive the pack)</label>
                      <input
                        type="email"
                        placeholder="you@example.com"
                        value={testerEmail}
                        onChange={e => { setTesterEmail(e.target.value); localStorage.setItem('demo_email', e.target.value); }}
                        className="w-full border rounded px-2 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-400 mt-0.5"
                      />
                    </div>
                    <div>
                      <label className="text-xs text-gray-500 font-medium">Anthropic API key (optional)</label>
                      <input
                        type="password"
                        placeholder="sk-ant-api03-..."
                        value={apiKey}
                        onChange={e => { setApiKey(e.target.value); localStorage.setItem('demo_anthropic_key', e.target.value); }}
                        className="w-full border rounded px-2 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-400 mt-0.5"
                      />
                    </div>
                    <p className="text-xs text-gray-400">Saved locally in your browser only</p>
                  </div>
                )}
                {pack?.generation_status === 'done' && (
                  <button onClick={sendEmail} disabled={emailLoading}
                    className="border border-gray-300 px-4 py-2 rounded-lg text-sm hover:bg-gray-50 flex items-center gap-2 whitespace-nowrap">
                    {emailLoading ? <Spinner/> : '📧'} Email Prep Pack
                  </button>
                )}
              </div>
            </div>
          </div>

          {msg && <div className="mb-4"><Alert type={msg.type} msg={msg.text} onClose={() => setMsg(null)}/></div>}

          {pack?.generation_status === 'generating' && (
            <div className="bg-blue-50 border border-blue-100 rounded-xl p-6 text-center mb-6">
              <div className="flex justify-center mb-2"><Spinner/></div>
              <p className="text-blue-700 font-medium">Generating your prep pack...</p>
              <p className="text-blue-600 text-sm mt-1">This usually takes 15-30 seconds</p>
            </div>
          )}

          {pack?.generation_status === 'failed' && (
            <Alert type="error" msg={`Generation failed: ${pack.generation_error}`}/>
          )}

          {pack?.generation_status === 'done' && (
            <PrepPackView pack={pack} emailLogs={emailLogs}/>
          )}

          {!pack && pack?.generation_status !== 'generating' && (
            <div className="text-center py-12 text-gray-400 bg-white border border-gray-200 rounded-xl">
              <div className="text-4xl mb-3">📋</div>
              <p className="font-medium text-gray-600">No prep pack yet</p>
              <p className="text-sm mt-1">Click "Generate Prep Pack" to create one</p>
            </div>
          )}
        </div>
      );
    }

    function PrepPackView({ pack, emailLogs }) {
      const Section = ({ title, icon, children }) => (
        <div className="bg-white border border-gray-200 rounded-xl p-6 mb-4">
          <h2 className="font-semibold text-gray-800 mb-3 flex items-center gap-2">{icon} {title}</h2>
          {children}
        </div>
      );

      const lastSent = emailLogs?.find(l => l.status === 'sent');

      return (
        <div className="fade-in">
          <Section title="Meeting Summary" icon="📌">
            <p className="text-gray-700 leading-relaxed">{pack.meeting_summary}</p>
          </Section>

          {pack.talking_points?.length > 0 && (
            <Section title="Talking Points" icon="💬">
              <ul className="space-y-2">
                {pack.talking_points.map((tp, i) => (
                  <li key={i} className="flex gap-3 text-sm text-gray-700">
                    <span className="flex-shrink-0 w-5 h-5 rounded-full bg-blue-100 text-blue-700 text-xs flex items-center justify-center font-bold mt-0.5">{i+1}</span>
                    {tp}
                  </li>
                ))}
              </ul>
            </Section>
          )}

          {pack.expected_questions?.length > 0 && (
            <Section title="Questions You May Be Asked" icon="🎯">
              <div className="space-y-4">
                {pack.expected_questions.map((q, i) => (
                  <div key={i} className="border-l-2 border-blue-200 pl-4">
                    <p className="font-medium text-sm text-gray-800">{q.question}</p>
                    <p className="text-sm text-gray-500 mt-1">{q.suggested_answer}</p>
                  </div>
                ))}
              </div>
            </Section>
          )}

          {pack.questions_to_ask?.length > 0 && (
            <Section title="Questions to Ask Them" icon="🙋">
              <ul className="space-y-2">
                {pack.questions_to_ask.map((q, i) => (
                  <li key={i} className="text-sm text-gray-700 flex gap-2">
                    <span className="text-blue-400 flex-shrink-0">→</span> {q}
                  </li>
                ))}
              </ul>
            </Section>
          )}

          {pack.prep_checklist?.length > 0 && (
            <Section title="30-Minute Prep Checklist" icon="✅">
              <div className="space-y-2">
                {pack.prep_checklist.map((item, i) => (
                  <label key={i} className="flex items-start gap-3 cursor-pointer group">
                    <input type="checkbox" className="mt-0.5 w-4 h-4 text-blue-600 rounded"/>
                    <span className="text-sm text-gray-700">{item.item || item}</span>
                  </label>
                ))}
              </div>
            </Section>
          )}

          {pack.caveats?.length > 0 && (
            <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-4">
              <h3 className="font-medium text-amber-800 mb-2 flex items-center gap-2">⚠️ Caveats & Assumptions</h3>
              <ul className="space-y-1">
                {pack.caveats.map((c, i) => (
                  <li key={i} className="text-sm text-amber-700 flex gap-2"><span>•</span>{c}</li>
                ))}
              </ul>
            </div>
          )}

          {lastSent && (
            <p className="text-xs text-gray-400 text-center mt-2">
              Last emailed {new Date(lastSent.sent_at + 'Z').toLocaleString()}
            </p>
          )}
        </div>
      );
    }

    // ─── Review Queue ─────────────────────────────────────────────────────────
    function ReviewQueue({ onBack, onDecide }) {
      const [events, setEvents] = useState([]);
      const [loading, setLoading] = useState(true);
      const [deciding, setDeciding] = useState({});
      const [msg, setMsg] = useState(null);

      const labels = ['interview', 'recruiter_screen', 'networking', 'company_intro', 'not_job_related'];
      const labelColors = {
        interview: 'bg-green-600 hover:bg-green-700',
        recruiter_screen: 'bg-blue-600 hover:bg-blue-700',
        networking: 'bg-purple-600 hover:bg-purple-700',
        company_intro: 'bg-yellow-500 hover:bg-yellow-600',
        not_job_related: 'bg-gray-500 hover:bg-gray-600',
      };

      useEffect(() => {
        api.get('/review').then(setEvents).catch(e => setMsg({ type: 'error', text: e.message })).finally(() => setLoading(false));
      }, []);

      async function decide(eventId, label) {
        setDeciding(d => ({ ...d, [eventId]: label }));
        try {
          await api.post(`/review/${eventId}/decide`, { label, generate_prep: true });
          setEvents(e => e.filter(ev => ev.id !== eventId));
          setMsg({ type: 'success', text: `Labeled as "${label.replace(/_/g, ' ')}". ${label !== 'not_job_related' ? 'Prep pack generation started.' : ''}` });
        } catch(e) { setMsg({ type: 'error', text: e.message }); }
        finally { setDeciding(d => { const n = {...d}; delete n[eventId]; return n; }); }
      }

      const fmt = (dt) => new Date(dt + 'Z').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });

      return (
        <div className="max-w-3xl mx-auto px-4 py-8">
          <button onClick={onBack} className="text-blue-600 text-sm hover:underline mb-6">← Back to Dashboard</button>
          <h1 className="text-2xl font-bold mb-2">Review Queue</h1>
          <p className="text-gray-500 mb-6">These events were classified as ambiguous. Classify them to generate prep packs.</p>

          {msg && <div className="mb-4"><Alert type={msg.type} msg={msg.text} onClose={() => setMsg(null)}/></div>}

          {loading ? (
            <div className="flex justify-center py-12"><Spinner/></div>
          ) : events.length === 0 ? (
            <div className="text-center py-16 bg-white border border-gray-200 rounded-xl">
              <div className="text-4xl mb-3">🎉</div>
              <p className="font-medium text-gray-700">All caught up!</p>
              <p className="text-sm text-gray-400 mt-1">No ambiguous events to review</p>
            </div>
          ) : (
            <div className="space-y-4">
              {events.map(event => (
                <div key={event.id} className="bg-white border border-gray-200 rounded-xl p-5">
                  <h3 className="font-semibold text-gray-900">{event.title}</h3>
                  <p className="text-sm text-gray-500 mt-1">{fmt(event.start_time)}</p>
                  {event.attendees?.length > 0 && (
                    <p className="text-sm text-gray-400 mt-1">👥 {event.attendees.slice(0,3).map(a => a.email).join(', ')}</p>
                  )}
                  {event.description && (
                    <p className="text-xs text-gray-400 mt-2 line-clamp-2">{event.description.slice(0, 200)}</p>
                  )}
                  <div className="flex flex-wrap gap-2 mt-4">
                    {labels.map(label => (
                      <button key={label} onClick={() => decide(event.id, label)}
                        disabled={deciding[event.id] !== undefined}
                        className={`text-white text-xs px-3 py-1.5 rounded-lg font-medium ${labelColors[label]} disabled:opacity-50 flex items-center gap-1`}>
                        {deciding[event.id] === label ? <Spinner/> : null}
                        {label.replace(/_/g, ' ')}
                      </button>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // ─── Profile Editor ───────────────────────────────────────────────────────
    function ProfileEditor({ onBack }) {
      const [profile, setProfile] = useState(null);
      const [form, setForm] = useState({});
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [resumeFile, setResumeFile] = useState(null);
      const [msg, setMsg] = useState(null);

      useEffect(() => {
        api.get('/profile').then(p => {
          setProfile(p);
          setForm({
            name: p.name || '',
            email: p.email || '',
            target_roles: (p.target_roles || []).join(', '),
            background_summary: p.background_summary || '',
            key_projects: (p.key_projects || []).join(', '),
          });
        }).catch(e => setMsg({ type: 'error', text: e.message })).finally(() => setLoading(false));
      }, []);

      async function save() {
        setSaving(true); setMsg(null);
        try {
          await api.patch('/profile', {
            name: form.name,
            email: form.email,
            target_roles: form.target_roles.split(',').map(r => r.trim()).filter(Boolean),
            background_summary: form.background_summary,
            key_projects: form.key_projects.split(',').map(p => p.trim()).filter(Boolean),
          });
          if (resumeFile) {
            const fd = new FormData(); fd.append('file', resumeFile);
            await api.upload('/profile/resume', fd);
          }
          setMsg({ type: 'success', text: 'Profile saved!' });
        } catch(e) { setMsg({ type: 'error', text: e.message }); }
        finally { setSaving(false); }
      }

      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      if (loading) return <div className="flex justify-center py-20"><Spinner/></div>;

      return (
        <div className="max-w-2xl mx-auto px-4 py-8">
          <button onClick={onBack} className="text-blue-600 text-sm hover:underline mb-6">← Back</button>
          <h1 className="text-2xl font-bold mb-6">Edit Profile</h1>

          <div className="bg-white border border-gray-200 rounded-xl p-6 space-y-5">
            {[
              { key: 'name', label: 'Full name', type: 'text' },
              { key: 'email', label: 'Email', type: 'email' },
              { key: 'target_roles', label: 'Target roles (comma-separated)', type: 'text' },
            ].map(({ key, label, type }) => (
              <div key={key}>
                <label className="block text-sm font-medium mb-1">{label}</label>
                <input type={type} className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                  value={form[key] || ''} onChange={e => set(key, e.target.value)}/>
              </div>
            ))}
            <div>
              <label className="block text-sm font-medium mb-1">Background summary</label>
              <textarea rows={4} className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                value={form.background_summary || ''} onChange={e => set('background_summary', e.target.value)}/>
            </div>
            <div>
              <label className="block text-sm font-medium mb-1">Key projects (comma-separated)</label>
              <input className="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                value={form.key_projects || ''} onChange={e => set('key_projects', e.target.value)}/>
            </div>
            <div>
              <label className="block text-sm font-medium mb-1">
                Resume (PDF) {profile?.resume_filename && <span className="text-gray-400 font-normal">— current: {profile.resume_filename}</span>}
              </label>
              <input type="file" accept=".pdf" onChange={e => setResumeFile(e.target.files[0])}
                className="text-sm text-gray-600"/>
            </div>
          </div>

          {msg && <div className="mt-4"><Alert type={msg.type} msg={msg.text} onClose={() => setMsg(null)}/></div>}

          <button onClick={save} disabled={saving}
            className="mt-4 w-full bg-blue-600 text-white rounded-lg py-2.5 font-medium hover:bg-blue-700 disabled:opacity-50 flex items-center justify-center gap-2">
            {saving ? <Spinner/> : null} Save Changes
          </button>
        </div>
      );
    }

    // ─── Root app ─────────────────────────────────────────────────────────────
    function App() {
      const [page, setPage] = useState('loading');
      const [authStatus, setAuthStatus] = useState(null);
      const [profile, setProfile] = useState(null);
      const [selectedEvent, setSelectedEvent] = useState(null);
      const [selectedEventId, setSelectedEventId] = useState(null);

      // Check for OAuth error in URL
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        if (params.get('error')) {
          console.error('OAuth error:', params.get('error'));
          window.history.replaceState({}, '', '/');
        }
      }, []);

      useEffect(() => {
        const isDemo = window.location.pathname === '/demo';
        if (!isDemo) {
          // Landing page — always show onboarding regardless of auth state
          setPage('onboarding');
          return;
        }
        // Demo path — load auth and go straight to dashboard
        (async () => {
          try {
            const status = await fetch('/auth/me', { credentials: 'include' }).then(r => r.json());
            setAuthStatus(status);
            if (status.is_authenticated) {
              try { const prof = await api.get('/profile'); setProfile(prof); } catch {}
              setPage('dashboard');
            } else {
              setPage('onboarding');
            }
          } catch {
            setPage('onboarding');
          }
        })();
      }, []);

      const goTo = (p, data) => {
        if (p === 'event' && data) setSelectedEventId(data.id);
        setPage(p);
      };

      if (page === 'loading') return <div className="min-h-screen flex items-center justify-center"><Spinner/></div>;
      if (page === 'onboarding') return <Onboarding onComplete={() => setPage('dashboard')}/>;
      if (page === 'review') return <ReviewQueue onBack={() => setPage('dashboard')} onDecide={() => {}} />;
      if (page === 'profile') return <ProfileEditor onBack={() => setPage('dashboard')}/>;
      if (page === 'event') return <EventDetail eventId={selectedEventId} onBack={() => setPage('dashboard')}/>;

      return <Dashboard user={profile} authStatus={authStatus} onPage={goTo}/>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
